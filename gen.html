<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-100 flex items-center justify-center min-h-screen">
  <div class="bg-sky-100 border-4 border-yellow-400 rounded-xl shadow-xl max-w-lg w-full text-center p-8">
    
    <!-- Top floral banner -->
    <div class="flex justify-center space-x-4 mb-6">
      <img src="yellow-rose.png" alt="Yellow Rose" class="w-16 h-16 rounded-full shadow-md">
      <img src="white-lily.png" alt="White Lily" class="w-16 h-16 rounded-full shadow-md">
      <img src="yellow-rose.png" alt="Yellow Rose" class="w-16 h-16 rounded-full shadow-md">
    </div>

    <!-- Title -->
    <p class="text-lg text-gray-700 font-semibold mb-2">
      Meraikan Cinta <span class="text-red-500">♥</span>
    </p>

    <!-- Names -->
    <h1 class="font-[cursive] text-4xl text-yellow-600 mb-4">
      Khadijah & Syazani
    </h1>

    <!-- Tulip centerpiece -->
    <div class="flex justify-center mb-4">
      <img src="./images/tulipbg.png" alt="Yellow Tulip" class="w-20 h-20">
    </div>

    <!-- Date -->
    <p class="text-xl text-gray-800 mb-2">٤/٤ ٢٠٢٦</p>

    <!-- Time -->
    <p class="text-gray-700 mb-2">11 pagi, 4 petang</p>

    <!-- Location -->
    <p class="text-gray-700 mb-6">Dengkil, Selangor</p>

    <!-- Bottom floral banner -->
    <div class="flex justify-center space-x-4 mt-6">
      <img src="white-lily.png" alt="White Lily" class="w-16 h-16 rounded-full shadow-md">
      <img src="yellow-rose.png" alt="Yellow Rose" class="w-16 h-16 rounded-full shadow-md">
      <img src="white-lily.png" alt="White Lily" class="w-16 h-16 rounded-full shadow-md">
    </div>
  </div>
</body>
</html>
