<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Boilerplate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Header -->
  <header class="bg-blue-600 text-white">
    <div class="container mx-auto flex justify-between items-center p-4">

      <h1 class="text-xl font-bold">Undangan Perkahwinan</h1>
      
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto my-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-6">

    <div class="bg-gray-500 p-6 rounded max-w-sm justify-self-center">
      <h2 class="text-2xl font-bold mb-4">Meraikan Cinta</h2>
      
      <img src="./images/sni.png" class="w-60 h-60" />

    </div>

    <div class="bg-gray-500 p-6 rounded max-w-sm justify-self-center">
      <h2 class="text-2xl font-bold mb-4">4 April 2026</h2>
      
      <img class="w-60 h-70" src="./images/date.png" />

    </div>

    <div class="bg-gray-500 p-6 rounded max-w-sm justify-self-center">
      <h2 class="text-2xl font-bold mb-4">Lokasi Majlis</h2>
      
      <iframe class="w-60 h-64" src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d996.1958191358211!2d101.66595626466562!3d2.8787793547566953!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMsKwNTInNDMuNiJOIDEwMcKwMzknNTkuOCJF!5e0!3m2!1sen!2smy!4v1772955056785!5m2!1sen!2smy" 
                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    </div>

    <div class="bg-gray-500 p-6 rounded max-w-sm justify-self-center">
      <h2 class="text-2xl font-bold mb-4">Aturcara Majlis</h2>
      
      <ul class="w-60 h-60 max-w-md">
        <li>2 Petang: Ketibaan pengantin lelaki</li>
        <li>2 30 Petang: Majlis akad nikah</li>
        <li>3 Petang: Makan</li>
      </ul>
      

    </div>
    
  </main>

  <!-- Footer -->
  <footer class="bg-blue-600 text-white text-center p-4 mt-6">
  </footer>

</body>
</html>
